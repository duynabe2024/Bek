<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BEK</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">BEK</div>
      <div class="subtitle">Соцсеть твоего проекта</div>
    </div>
    <div class="current-user" id="currentUserBox">Гость</div>
  </header>

  <main class="page">
    <aside class="sidebar">
      <section class="card" id="authCard">
        <h2>Аккаунт</h2>
        <input id="usernameInput" type="text" placeholder="Ник" maxlength="20" />
        <input id="passwordInput" type="password" placeholder="Пароль" maxlength="50" />
        <div class="stack">
          <button id="registerBtn" type="button">Регистрация</button>
          <button id="loginBtn" class="secondary" type="button">Вход</button>
        </div>
      </section>

      <section class="card" id="profileCard">
        <h2>Профиль</h2>

        <div class="profile-box">
          <img id="avatarPreview" class="avatar big" src="" alt="avatar" />
          <div>
            <div class="muted">Текущий пользователь</div>
            <div id="profileName">—</div>
          </div>
        </div>

        <label class="muted">Аватар</label>
        <input type="file" id="avatarInput" accept="image/*" />
        <button id="avatarBtn" type="button">Загрузить аватар</button>

        <label class="muted">О себе</label>
        <textarea id="bioInput" placeholder="Расскажи о себе"></textarea>

        <label class="muted">День рождения</label>
        <input type="date" id="birthdayInput" />

        <button id="saveProfileBtn" type="button">Сохранить профиль</button>

        <a href="/dialogs" id="dialogsBtn" class="menu-link">
          Чаты
          <span id="dialogsBadge" class="badge" style="display:none;">0</span>
        </a>

        <a href="/subscriptions" class="menu-link">
          Подписки и подписчики
          <span id="followersBadge" class="badge" style="display:none;">0</span>
        </a>

        <button id="logoutBtn" class="danger" type="button">Выйти</button>
      </section>
    </aside>

    <section class="content">
      <section class="card" id="postCard">
        <h2>Новый пост</h2>
        <textarea id="postContent" placeholder="Что нового?"></textarea>

        <label class="muted">Категория</label>
        <select id="postCategory"></select>

        <input type="file" id="postImage" accept="image/*" />
        <button id="createPostBtn" type="button">Опубликовать</button>
      </section>

      <section class="card">
        <div class="feed-head">
          <h2>Лента</h2>

          <div class="feed-filters">
            <div class="filter-group">
              <div class="muted">Показывать</div>
              <div class="filter-row" id="feedTypeFilters"></div>
            </div>

            <div class="filter-group">
              <div class="muted">Категории</div>
              <div class="filter-row" id="categoryFilters"></div>
            </div>
          </div>
        </div>

        <div id="posts" class="posts"></div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
